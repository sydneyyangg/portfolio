<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sydney — Embedded Systems Engineer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap');

  :root {
    --o-mid:    #e85c00;
    --o-bright: #ff8c28;
    --o-pale:   #ffd090;
    --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

  /* ── PAGE SYSTEM ── */
  .page { display: none; min-height: 100vh; flex-direction: column; }
  .page.active { display: flex; }

  /* ════════════════════════════════════════════
     BACKGROUND SYSTEM
     • Login: CSS nature gradient + leaf/orb motifs
     • Main pages: image behind everything, or CSS fallback
  ════════════════════════════════════════════ */

  /* LOGIN – soft lime-glass sunlight feel */
  #page-login {
    align-items: center; justify-content: center;
    background: url('images/frutigeraeroclover.jpg') center/cover no-repeat;
  }

  /* Main pages — set --bg-image via JS or leave as CSS fallback */
  #page-main {
    background:
      radial-gradient(ellipse 70% 50% at 50% -8%,  rgba(230,255,160,0.55) 0%, transparent 52%),
      radial-gradient(ellipse 50% 60% at 0%   70%,  rgba(140,210,40,0.30) 0%, transparent 50%),
      radial-gradient(ellipse 40% 55% at 100% 30%,  rgba(160,230,50,0.25) 0%, transparent 50%),
      linear-gradient(165deg,
        #d4f070 0%,
        #aad820 18%,
        #80b800 38%,
        #559000 58%,
        #306800 78%,
        #184000 100%);
    background-attachment: fixed;
  }
  /* When a real photo is set */
  #page-main.has-bg-image {
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  /* ════════════════════════════════════════════
     GLASS PANEL — warm dark tint, readable white
     text, glassy shine, fully see-through via blur
  ════════════════════════════════════════════ */
  .glass-panel {
    /* warmer: a touch of amber/olive mixed into the green */
    background: linear-gradient(158deg,
      rgba(15, 34, 4, 0.56) 0%,
      rgba(6, 11, 1, 0.5) 35%,
      rgba(24, 45, 5, 0.54) 70%,
      rgba(6, 21, 1, 0.6) 100%);
    border: 1.5px solid rgba(255,255,255,0.32);
    border-radius: 16px;
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,0.60),
      inset 0 -1px  0 rgba(0,0,0,0.22),
      inset 1px 0   0 rgba(255,255,255,0.20),
      0 8px 36px rgba(0,0,0,0.42),
      0 2px 10px rgba(0,0,0,0.26);
    backdrop-filter: blur(18px) saturate(1.5);
    position: relative; overflow: hidden;
  }
  /*
   * GLOSSY TOP-SHINE — more dramatic than last iteration.
   * The two-stop design gives a bright crisp band at top
   * that dissolves to nothing at ~58%, like liquid glass.
   */
  .glass-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 52%;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.52) 0%,
      rgba(255,255,255,0.20) 32%,
      rgba(255,255,255,0.04) 58%,
      transparent 100%);
    border-radius: 16px 16px 75% 75% / 16px 16px 52px 52px;
    pointer-events: none; z-index: 1;
  }
  .glass-panel > * { position: relative; z-index: 2; }

  /* ════════════════════════════════════════════
     ORB — glassy water-bubble style, clear not plastic
  ════════════════════════════════════════════ */
  .orb {
    border-radius: 50%; flex-shrink: 0; position: relative;
    /* clear glass: very light fill, strong rim darkening */
    background: radial-gradient(circle at 36% 30%,
      rgba(255,255,255,0.92) 0%,
      rgba(210,255,180,0.50) 18%,
      rgba(140,220,80,0.20)  42%,
      rgba(60,150,20,0.14)   66%,
      rgba(10,60,0,0.22)     88%,
      rgba(0,30,0,0.38)      100%);
    box-shadow:
      /* inner rim shadow — gives glass depth */
      inset 0 0 0 1.5px rgba(255,255,255,0.18),
      inset -6px -8px 20px rgba(0,60,0,0.28),
      inset 4px  5px  14px rgba(255,255,255,0.22),
      /* outer glow */
      0 4px 18px rgba(80,160,0,0.22),
      0 1px  4px rgba(0,0,0,0.15);
  }
  /* primary highlight — large crescent top-left */
  .orb::before {
    content: ''; position: absolute;
    top: 7%; left: 12%; width: 44%; height: 28%;
    background: radial-gradient(ellipse,
      rgba(255,255,255,0.90) 0%,
      rgba(255,255,255,0.40) 50%,
      transparent 100%);
    border-radius: 50%; transform: rotate(-30deg);
    z-index: 2;
  }
  /* secondary small highlight — bottom-right rim catch */
  .orb::after {
    content: ''; position: absolute;
    bottom: 14%; right: 12%; width: 22%; height: 14%;
    background: radial-gradient(ellipse,
      rgba(255,255,255,0.55) 0%, transparent 100%);
    border-radius: 50%; transform: rotate(20deg);
    z-index: 2;
  }

  /* ════════════════════════════════════════════
     BUTTONS
  ════════════════════════════════════════════ */
  .btn-gloss {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 11px 28px; border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0.65);
    background: linear-gradient(180deg,
      rgba(255,255,255,0.90) 0%,
      rgba(215,255,80,0.88)  44%,
      rgba(145,210,0,0.96)   50%,
      rgba(72,140,0,0.99)    100%);
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,0.99),
      inset 0 -1px  0 rgba(0,50,0,0.30),
      0 5px 14px rgba(40,90,0,0.40),
      0 0   0 1px rgba(0,70,0,0.18);
    color: #142200; font-family: var(--font);
    font-size: 13px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    text-shadow: 0 1px 0 rgba(255,255,255,0.55);
    transition: filter .12s, transform .08s;
  }
  .btn-gloss:hover  { filter: brightness(1.09); transform: translateY(-1px); }
  .btn-gloss:active { filter: brightness(0.95); transform: translateY(1px); }

  .btn-orange {
    background: linear-gradient(180deg,
      rgba(255,255,255,0.90) 0%,
      rgba(255,210,110,0.88) 44%,
      rgba(255,122,20,0.96)  50%,
      rgba(192,62,0,0.99)    100%);
    border-color: rgba(255,195,90,0.72);
    box-shadow:
      inset 0 1.5px 0 rgba(255,255,255,0.99),
      inset 0 -1px  0 rgba(95,25,0,0.30),
      0 5px 14px rgba(170,60,0,0.40);
    color: #240600;
  }

  .btn-chrome {
    background: linear-gradient(180deg,
      rgba(255,255,255,0.95) 0%,
      rgba(224,242,185,0.90) 44%,
      rgba(162,196,90,0.96)  50%,
      rgba(100,152,42,0.99)  100%);
    border-color: rgba(255,255,255,0.85);
    color: #142200;
  }

  /* ════════════════════════════════════════════
     SCROLLBAR
  ════════════════════════════════════════════ */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgba(0,30,0,0.25); border-radius: 4px; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(200,240,60,0.7), rgba(60,130,0,0.8));
    border-radius: 4px; border: 1px solid rgba(255,255,255,0.25);
  }

  /* ════════════════════════════════════════════
     BACKGROUND BOKEH — spawned by JS post-login
  ════════════════════════════════════════════ */
  .bg-orbs-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-orb-bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 36% 30%,
      rgba(255,255,255,0.88) 0%,
      rgba(220,255,170,0.42) 20%,
      rgba(130,210,40,0.16)  50%,
      rgba(40,110,0,0.10)    80%,
      rgba(0,30,0,0.16)      100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.14),
      inset -3px -4px 12px rgba(0,50,0,0.20),
      inset  2px  3px  8px rgba(255,255,255,0.18);
  }
  .bg-orb-bubble::before {
    content: ''; position: absolute;
    top: 8%; left: 13%; width: 42%; height: 26%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.82) 0%, transparent 100%);
    border-radius: 50%; transform: rotate(-28deg);
  }

  /* ════════════════════════════════════════════
     LOGIN DECORATIVE MOTIFS
  ════════════════════════════════════════════ */

  /* Clover */
  .clover-wrap {
    position: fixed; bottom: -30px; left: -40px;
    width: 280px; height: 280px; pointer-events: none; opacity: 0.60;
  }
  .clover-leaf {
    position: absolute; width: 95px; height: 125px;
    background: radial-gradient(ellipse at 38% 38%,
      rgba(255,255,255,0.55) 0%,
      #b8e030 20%, #72a810 55%, #1c5800 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.30), 0 4px 12px rgba(0,40,0,0.30);
  }
  .clover-leaf:nth-child(1) { transform: rotate(0deg)   translateY(-38px); transform-origin: 50% 100%; }
  .clover-leaf:nth-child(2) { transform: rotate(120deg) translateY(-38px); transform-origin: 50% 100%; }
  .clover-leaf:nth-child(3) { transform: rotate(240deg) translateY(-38px); transform-origin: 50% 100%; }
  .clover-stem {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 8px; height: 58px;
    background: linear-gradient(180deg, #90cc10, #1c5800); border-radius: 4px;
  }

  /* CSS leaf silhouette top-right */
  .login-leaf-tr {
    position: fixed; top: -20px; right: -20px; pointer-events: none;
    width: 200px; height: 260px; opacity: 0.35;
    background: radial-gradient(ellipse at 40% 40%,
      rgba(255,255,255,0.50) 0%, #c0e020 20%, #68a000 55%, #1a4800 100%);
    border-radius: 0% 0% 100% 100% / 0% 0% 70% 70%;
    transform: rotate(35deg) translate(30px, -30px);
  }
  .login-leaf-bl {
    position: fixed; bottom: 40px; right: 80px; pointer-events: none;
    width: 130px; height: 180px; opacity: 0.25;
    background: radial-gradient(ellipse at 40% 40%,
      rgba(255,255,255,0.40) 0%, #a8d010 25%, #50880a 60%, #183800 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform: rotate(-20deg);
  }

  /* ════════════════════════════════════════════
     LOGIN FORM
  ════════════════════════════════════════════ */
  .login-wrap {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    width: 310px;
  }
  .login-avatar {
    width: 108px; height: 108px; border-radius: 10px;
    border: 3px solid rgba(255,255,255,0.95);
    box-shadow:
      0 0 0 1px rgba(140,180,60,0.50),
      0 0 0 3px rgba(200,220,160,0.60),
      0 8px 24px rgba(0,30,0,0.30),
      inset 0 1px 0 rgba(255,255,255,0.80);
    background: linear-gradient(145deg,
      rgba(255,255,255,0.70) 0%,
      rgba(210,250,100,0.50) 100%);
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center; font-size: 52px;
  }
  .login-avatar::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.52) 0%, transparent 100%); z-index: 1;
  }
  .login-username {
  font-size: 17px; font-weight: 300; color: #182800;
  text-shadow: 0 1px 4px rgba(0,0,0,0.40); letter-spacing: 0.4px;
  }
  .login-input-wrap {
    width: 260px; display: flex; align-items: center;
    background: rgba(255,255,255,0.96);
    border: 1.5px solid rgba(180,210,80,0.70);
    border-radius: 999px;
    box-shadow:
      inset 0 2px 6px rgba(0,60,0,0.10),
      0 2px 8px rgba(0,0,0,0.18),
      0 1px 0 rgba(255,255,255,0.90);
    overflow: hidden;
  }
  .login-input-wrap input {
    flex: 1; padding: 10px 16px;
    background: transparent; border: none; outline: none;
    font-family: var(--font); font-size: 13px;
    color: #2a4400;
  }
  .login-input-wrap input::placeholder { color: #8ab840; }
  .login-go {
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.90) 0%,
      rgba(255,215,118,0.88) 44%,
      rgba(255,122,20,0.96)  50%,
      rgba(192,62,0,0.99)    100%);
    border: none;
    border-left: 1px solid rgba(255,180,60,0.40);
    border-radius: 0 999px 999px 0;
    cursor: pointer; transition: filter .1s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.80);
  }
  .login-go:hover { filter: brightness(1.12); }
  .login-go svg { fill: white; width: 16px; height: 16px; }
  .login-hint {
    font-size: 12.5px; font-weight: 300;
    font-family: var(--font);
    color: rgba(30,60,0,0.90);
    text-shadow: 0 1px 0 rgba(255,255,255,0.70);
    text-align: center;
  }
  .login-hint strong {
    font-weight: 600; color: #182800;
  }

  /* ════════════════════════════════════════════
     NAV BAR
  ════════════════════════════════════════════ */
  .navbar {
    position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    background: rgba(0, 28, 0, 0.78);
    border-bottom: 1px solid rgba(160,220,0,0.28);
    box-shadow: 0 2px 18px rgba(0,0,0,0.50), inset 0 1px 0 rgba(160,220,0,0.15);
    backdrop-filter: blur(20px);
    padding: 0 28px;
    display: flex; align-items: center; gap: 4px; height: 52px;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    margin-right: 18px; cursor: pointer;
  }
  .nav-brand-orb { width: 28px; height: 28px; }
  .nav-brand-text {
    font-size: 15px; font-weight: 700; color: #c8f040;
    text-shadow: 0 0 10px rgba(180,230,0,0.40);
  }
  .nav-sep { width: 1px; height: 24px; background: rgba(160,220,0,0.22); margin: 0 6px; }
  .nav-item {
    padding: 7px 16px; border-radius: 18px;
    font-size: 13px; font-weight: 600; color: #a0c040;
    cursor: pointer; text-decoration: none;
    border: 1.5px solid transparent; transition: all .12s;
  }
  .nav-item:hover {
    background: rgba(140,200,0,0.18); border-color: rgba(160,220,0,0.36); color: #d0f060;
  }
  .nav-item.active {
    background: linear-gradient(180deg, rgba(160,220,0,0.28) 0%, rgba(100,170,0,0.20) 100%);
    border-color: rgba(160,220,0,0.52); color: #eeff7e;
    box-shadow: 0 0 8px rgba(150,210,0,0.20), inset 0 1px 0 rgba(255,255,255,0.16);
  }

  /* ════════════════════════════════════════════
     LAYOUT
  ════════════════════════════════════════════ */
  .main-shell { display: flex; flex: 1; }

  .sidebar {
    width: 196px; flex-shrink: 0;
    background: rgba(0, 20, 0, 0.72);
    border-right: 1px solid rgba(130,190,0,0.20);
    padding: 18px 10px;
    display: flex; flex-direction: column; gap: 5px;
    backdrop-filter: blur(18px);
  }
  .sidebar-section {
    font-size: 10px; font-weight: 700; color: rgba(160,210,60,0.55);
    letter-spacing: 1.2px; text-transform: uppercase; padding: 10px 8px 4px;
  }
  .sidebar-item,
  .sidebar-item:visited {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 8px;
    font-size: 12.5px; font-weight: 500; color: rgba(180,230,80,0.80);
    cursor: pointer; transition: all .1s; border: 1px solid transparent;
    text-decoration: none;
  }
  .sidebar-item:hover {
    background: rgba(140,200,0,0.18); border-color: rgba(160,220,0,0.28); color: #c8f060;
  }
  .sidebar-item.active {
    background: linear-gradient(90deg, rgba(150,210,0,0.25) 0%, rgba(90,155,0,0.16) 100%);
    border-color: rgba(160,220,0,0.42); color: #d8f060;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .content-area {
    flex: 1; padding: 28px 32px; overflow-y: auto;
    /* transparent so bg image shows through */
    background: transparent;
  }

  /* ════════════════════════════════════════════
     TYPOGRAPHY — consistent across all pages
     (home style = h1/h2/body style used everywhere)
  ════════════════════════════════════════════ */
  .pg-title {       /* large heading like "welcome to..." */
    font-size: 30px; font-weight: 300; color: #f0ffe8;
    letter-spacing: -0.5px; margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.40);
  }
  .pg-subtitle {    /* one-liner descriptor */
    font-size: 14px; color: rgba(220,255,160,0.80);
    margin-bottom: 26px; line-height: 1.58;
  }
  .pg-section {     /* section heading like "about me" */
    font-size: 22px; font-weight: 300; color: #f0ffe8;
    margin-bottom: 8px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.30);
  }
  .pg-body {        /* body paragraphs */
    font-size: 13.5px; color: rgba(215,255,155,0.90);
    line-height: 1.70; margin-bottom: 20px;
  }
  .pg-meta {        /* dates, companies — orange accent */
    font-size: 12px; color: rgba(255,200,100,0.90);
    font-weight: 600; margin-bottom: 5px;
  }

  .page-header-rule {
    font-size: 22px; font-weight: 300; color: #f0ffe8;
    text-shadow: 0 2px 12px rgba(0,0,0,0.40);
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .page-header-rule::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(160,220,0,0.50), transparent);
  }

  /* ════════════════════════════════════════════
     HOME PAGE
  ════════════════════════════════════════════ */
  .home-panel { max-width: 680px; margin: 0 auto; padding: 36px 42px; }
  .home-btn-row { margin-top: 28px; display: flex; gap: 14px; flex-wrap: wrap; }

  /* ════════════════════════════════════════════
     PROJECTS PAGE — community-gallery layout
     Big title panel + two-column card grid
  ════════════════════════════════════════════ */
  .projects-header-panel {
    padding: 28px 32px; margin-bottom: 24px;
  }

  .projects-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .proj-card {
    display: flex; align-items: center; gap: 20px;
    padding: 22px 24px;
    cursor: pointer; transition: transform .14s;
    min-height: 110px;
  }
  .proj-card:hover { transform: translateY(-2px); }

  /* ── PROJECT CARD THUMBNAIL ──
     Square image slot on the left of each card.
     When p.preview is set it shows your photo;
     when empty it shows a labelled placeholder.  */
  .proj-card-thumb {
    width: 88px; height: 88px; flex-shrink: 0;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.28);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.45),
      0 3px 12px rgba(0,0,0,0.35);
    background: rgba(0,30,0,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(180,230,60,0.45);
    font-style: italic; text-align: center;
    position: relative;
  }
  .proj-card-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  /* tiny gloss on the thumb */
  .proj-card-thumb::after {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 45%;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.22) 0%, transparent 100%);
    pointer-events: none;
  }

  .proj-card-text { flex: 1; min-width: 0; }
  .proj-card-name {
    font-size: 22px; font-weight: 300; color: #f0ffe8;
    margin-bottom: 5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .proj-card-desc {
    font-size: 13px; color: rgba(210,250,150,0.82); line-height: 1.55;
  }
  .proj-card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
  .proj-tag {
    font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 8px;
    background: rgba(255,128,28,0.20); border: 1px solid rgba(255,140,38,0.38);
    color: #ffd090;
  }

  /* ════════════════════════════════════════════
     PROJECT DETAIL
  ════════════════════════════════════════════ */
  .detail-section { margin-bottom: 14px; }
  .detail-section h3 {
    font-size: 11px; font-weight: 700; color: rgba(200,240,80,0.80);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;
  }
  .detail-images {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 10px;
    margin-top: 10px;
  }
  .project-embed {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid rgba(160,220,0,0.24);
    background: rgba(0,0,0,0.18);
  }
  .project-embed iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .project-links {
    display: flex;
    flex-wrap: wrap;

    }
    if (item.type === 'video' && item.src) {
      return `<div class="detail-img-slot"><video controls preload="metadata"><source src="${item.src}" type="video/mp4">Your browser cannot play this video. <a href="${item.src}" target="_blank" rel="noopener noreferrer">Open video</a>.</video></div>`;
    }
    if (item.type === 'link' && item.href) {
      return `<div class="detail-img-slot"><a href="${item.href}" target="_blank" rel="noopener noreferrer">${item.label || 'Open link'}</a></div>`;
    }
    const href = item.href || item.src;
    if (href) {
      return `<div class="detail-img-slot"><a href="${href}" target="_blank" rel="noopener noreferrer">${item.label || 'Open media'}</a></div>`;
    }
    const fallbackLabel = item.label || (item.type === 'video' ? 'Video' : item.type === 'image' ? 'Image' : 'Media');
    return `<div class="detail-img-slot">[ ${fallbackLabel} ]</div>`;
  }
  return `<div class="detail-img-slot">[ ${item} ]</div>`;
}

function renderProjectLinks(project) {
  if (!project.links || project.links.length === 0) {
    return '<div class="pg-body" style="margin-bottom:0;opacity:0.55;">No external link added yet.</div>';
  }
  return `
    <div class="project-links">
      ${project.links.map(link => `<a class="project-link" href="${link.href}" target="_blank" rel="noopener noreferrer">${link.label}</a>`).join('')}
    </div>`;
}

function renderProjectEmbed(project) {
  if (!project.embed || !project.embed.src) return '';
  return `
  <div class="glass-panel" style="padding:18px 22px;margin-top:4px;">
    <div class="detail-section">
      <h3>Prototype</h3>
      <div class="project-embed">
        <iframe src="${project.embed.src}" title="${project.embed.title || project.name}" allowfullscreen></iframe>
      </div>
    </div>
  </div>`;
}

/* ─── ROUTING ─── */
function navigate(view, projectId) {
  ['home','projects','about'].forEach(v => {
    const match = v === view || (v === 'projects' && view === 'project-detail');
    document.getElementById('nav-'+v)?.classList.toggle('active', match);
    document.getElementById('sb-'+v)?.classList.toggle('active', match);
  });
  const area = document.getElementById('content-area');
  if      (view === 'home')           area.innerHTML = renderHome();
  else if (view === 'projects')       area.innerHTML = renderProjects();
  else if (view === 'project-detail') area.innerHTML = renderProjectDetail(projectId);
  else if (view === 'about')          area.innerHTML = renderAbout();
  area.scrollTop = 0;
}

/* ─── PROJECTS LIST ─── */

/* ─── PROJECT DETAIL ─── */
function renderProjectDetail(id) {
  const p = PROJECTS.find(x=>x.id===id);
  if(!p) return '<p style="color:#ccc">Not found.</p>';
  return `
  <button class="btn-chrome back-btn" onclick="navigate('projects')">← Back to Projects</button>

  <div class="glass-panel" style="padding:22px 26px;margin-bottom:16px;">
    <div class="pg-title" style="margin-bottom:6px;">${p.name}</div>
    <div class="proj-card-tags" style="margin-bottom:14px;">
      ${p.tags.map(t=>`<span class="proj-tag">${t}</span>`).join('')}
    </div>
    <div class="detail-section">
      <h3>Overview</h3>
      <div class="pg-body" style="margin-bottom:0;">${linkify(p.overview)}</div>
    </div>
    <div class="detail-section" style="margin-top:14px;">
      <h3>Links</h3>
      ${renderProjectLinks(p)}
    </div>
  </div>

  ${p.details.map(d=>`
  <div class="glass-panel detail-section" style="padding:18px 22px;margin-bottom:12px;">
    <h3>${d.title}</h3>
    <div class="pg-body" style="margin-bottom:0;">${linkify(d.body)}</div>
  </div>`).join('')}

  ${renderProjectEmbed(p)}

  ${p.images.length > 0 ? `
  <div class="glass-panel" style="padding:18px 22px;margin-top:4px;">
    <div class="detail-section">
      <h3>Media</h3>
      <div class="pg-body" style="font-size:12px;margin-bottom:10px;opacity:0.55;">
      </div>
      <div class="detail-images">
        ${p.images.map(renderProjectMedia).join('')}
      </div>
    </div>
  </div>` : ''}`;
}
